services:
  mariadb:
    build: ./mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    networks:
      - back
    volumes:
      - mariadb_data:/var/lib/mysql

  wordpress:
    build: ./wordpress
    container_name: wordpress
    restart: always
    env_file:
      - .env
    depends_on:
      - mariadb
    networks:
      - front
      - back
    volumes:
      - wordpress_data:/var/www/html
    
  nginx:
    build:
      context: ./nginx
      args:
        - DOMAIN_NAME=${DOMAIN_NAME}
    container_name: nginx
    env_file:
      - .env
    restart: always
    ports:
      - "443:443"
    depends_on:
      - wordpress
    networks:
      - front
    volumes:
      - wordpress_data:/var/www/html

networks:
  front:
    driver: bridge
    name : front
  back:
    driver: bridge
    name : back

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jisokim2/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jisokim2/data/wordpress