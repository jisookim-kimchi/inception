services:
  mariadb:
    build: ./srcs/mariadb
    container_name: mariadb
    restart: always
    env_file:
      - .env
    networks:
      - back
    volumes:
      - /home/jisokim2/data/mariadb:/var/lib/mysql

  wordpress:
    build: ./srcs/wordpress
    container_name: wordpress
    restart: always
    env_file:
      - .env
    depends_on:
      - mariadb
    networks:
      - front
      - back
    volumes:
      - /home/jisokim2/data/wordpress:/var/www/html
    
  nginx:
    build:
      context: ./srcs/nginx
      args:
        - DOMAIN_NAME=${DOMAIN_NAME}
    container_name: nginx
    env_file:
      - .env
    restart: always
    ports:
      - "443:443"
    depends_on:
      - wordpress
    networks:
      - front
    volumes:
      - /home/jisokim2/data/wordpress:/var/www/html

networks:
  front:
    driver: bridge

  back:
    driver: bridge

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jisokim2/data/mariadb

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/jisokim2/data/wordpress